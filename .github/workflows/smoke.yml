# KTP Tier 1 — Build-time smoke for KTPHLTVRecorder
# Implementation in KTPInfrastructure/.github/workflows/smoke-callable.yml.

name: Tier 1 Smoke

on:
  push:
    branches: ['**']
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  smoke:
    uses: afraznein/KTPInfrastructure/.github/workflows/smoke-callable.yml@main
    with:
      under_test_label: KTPHLTVRecorder
      under_test_kind: amx_plugin
      amxx_source: KTPHLTVRecorder.sma
      artifact_container_path: /opt/hlds/dod/addons/ktpamx/plugins/KTPHLTVRecorder.amxx
      assert_plugin: KTPHLTVRecorder
    secrets:
      ktp_checkout_token: ${{ secrets.KTP_CHECKOUT_TOKEN }}
